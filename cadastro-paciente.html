<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/cadastro-paciente/cadastro-paciente.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Usuario.png}" type="image/png">
    <title>Cadastro - MedXF</title>
</head>
<body>

<header>
    <a th:href="@{/paciente/home}" id="botao-mais">
        <img id="img-mais" th:src="@{/assets/icones/Icone-Voltar.png}" alt="icone de voltar" width="20" height="20">
        <span>Voltar</span>
    </a>
    <img th:src="@{/assets/icones/Logo2.png}" alt="logo" width="100" height="40">
    <div class="usuario">
        <p id="nome-paciente">Seu Nome</p>
        <img id="icone-perfil" th:src="@{/assets/icones/Perfil.png}" alt="perfil" width="40" height="40">
    </div>
</header>

<div class="container">
    <div class="content">
        <div class="page-header">
            <div>
                <h1>Meus Dados</h1>
                <p>Preencha suas informações pessoais</p>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-card">
                <div class="card-header">
                    <div class="avatar">PA</div>
                    <div class="header-info">
                        <h2>Dados Pessoais</h2>
                        <span>Informações básicas</span>
                    </div>
                </div>

                <form th:action="@{/paciente/cadastro}" method="post">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Digite seu nome completo" name="nome" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Digite seu email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" placeholder="(00) 00000-0000" name="telefone" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Data de Nascimento</label>
                            <input type="date" name="nascimento" required>
                        </div>

                        <div class="form-group">
                            <label>Sexo</label>
                            <select name="sexo" required>
                                <option value="">Selecione</option>
                                <option value="MASCULINO">Masculino</option>
                                <option value="FEMININO">Feminino</option>
                                <option value="OUTRO">Outro</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>CPF</label>
                        <input type="text" placeholder="000.000.000-00" name="cpf" required>
                    </div>

                    <div class="form-group">
                        <label>Endereço</label>
                        <input type="text" placeholder="Rua, número, bairro" name="endereco">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Cidade</label>
                            <input type="text" placeholder="Sua cidade" name="cidade">
                        </div>

                        <div class="form-group">
                            <label>Estado</label>
                            <input type="text" placeholder="UF" name="estado" maxlength="2">
                        </div>
                    </div>

                    <div class="form-section-title">
                        <h3>Informações Adicionais</h3>
                        <p>Dados para melhor atendimento médico</p>
                    </div>

                    <div class="form-group">
                        <label>Alergias (se houver)</label>
                        <textarea placeholder="Descreva suas alergias conhecidas..." name="alergias"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Medicamentos em Uso</label>
                        <textarea placeholder="Liste os medicamentos que você toma regularmente..." name="medicamentos"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Histórico Médico</label>
                        <textarea placeholder="Descreva doenças, cirurgias ou condições de saúde importantes..." name="historico"></textarea>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="termos" required>
                            Concordo com os termos de uso e política de privacidade
                        </label>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn-save">Salvar Dados</button>
                        <a href="/paciente/home" class="btn-cancel">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
