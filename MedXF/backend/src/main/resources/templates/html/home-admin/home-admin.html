<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/home-admin/home-admin.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Casa.png}" type="image/png">
    <title>Início - MedXF</title>
</head>
<body>
    <header>
        <button id="botao-mais">
            <img id="img-mais" th:src="@{/assets/icones/Mais-Info.png}" alt="tres barras" width="20" height="20">
        </button>
        <img id="img-logo" th:src="@{/assets/icones/Logo2.png}" alt="logo 2" width="100" height="40">
        <h1 id="nome">Dr. Nome</h1>
        <img id="foto-perfil" th:src="@{/assets/icones/Perfil.png}" alt="" width="35" height="35">
    </header>
    <div class="titulo">
        <h2>Bem vindo, Adm. Nome</h2>
    </div>
    <div class="quadrados">
        <div class="quadrado">
            <p>Avaliações</p>
            <p>Totais</p>
            <p class="numeros">0</p>
        </div>
        <div class="quadrado">
            <p>Médicos</p>
            <p>Ativos</p>
            <p class="numeros">0</p>
        </div>
        <div class="quadrado">
            <p>Pacientes</p>
            <p>Cadastrados</p>
            <p class="numeros">0</p>
        </div>
    </div>
    <hr>
    <div class="principal-botoes">
        <button class="botao-principal">Cadastrar Médico</button>
        <button class="botao-principal">Gerenciar Médicos</button>
        <button class="botao-principal">Gerenciar Avaliações</button>
        <button class="botao-principal">Relatórios</button>
    </div>
</body>  
</html>
