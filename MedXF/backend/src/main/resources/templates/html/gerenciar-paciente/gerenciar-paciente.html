<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/gerenciar-paciente/gerenciar-paciente.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Usuario.png}" type="image/png">
    <title>Gerenciar Paciente - MedFX</title>
</head>
<body>
    <header>
        <a th:href="@{/medico/home}" id="botao-mais">
            <img id="img-mais" th:src="@{/assets/icones/Icone-Voltar.png}" alt="icone de voltar" width="20" height="20">
            <span>Menu Principal</span>
        </a>
        <h1 id="nome"></h1>
        <img th:src="@{/assets/icones/Logo2.png}" alt="logo" width="100" height="40">
    </header>
    <div class="layout">
        <main class="content">
            <div class="page-header">
                <div>
                    <h1>Pacientes</h1>
                    <p>Gerencie e atualize os dados dos pacientes.</p>
                </div>
                <a href="/medico/triagem" class="btn-new" role="button">
                    + Novo Paciente
                </a>
            </div>
            <div class="patient-grid">
                <div class="patient-card">
                    <div class="patient-top">
                        <div class="avatar">JS</div>
                        <div class="patient-info">
                            <h2>João Silva</h2>
                            <span>ID #2031</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" value="João Silva">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" value="joao@email.com">
                    </div>
                    <div class="form-group">
                        <label>Idade</label>
                        <input type="number" value="54">
                    </div>
                    <div class="form-group">
                        <label>Risco</label>
                        <select>
                            <option>Alto</option>
                            <option>Médio</option>
                            <option>Baixo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea>Paciente com sintomas respiratórios e febre persistente.</textarea>
                    </div>
                    <div class="actions">
                        <button class="save-btn">Salvar Alterações</button>
                        <button class="delete-btn">Excluir</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
