<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet"  th:href="@{/assets/css/inicio/inicio.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Inicio.png}" type="image/png">
    <title>Início - MedXF</title>
</head>
<body>
    <div class="imagem">
        <img th:src="@{/assets/icones/Logo.png}" alt="logo" width="250" height="80">
    </div>
    <div class="titulo">
        <h1 id="texto">Triagem clínica para Síndorme do X Frágil</h1>
    </div>
    <form class="botoes">
        <h2 id="texto-botoes">Escolha como deseja iniciar sua sessão:</h2>

        <a class="botao-home" th:href="@{/medico/login}">
            <img th:src="@{/assets/icones/Icone-Medico.png}" alt="icone medico" width="90" height="90">
            <p>Médico(a)</p>
        </a>

        <a class="botao-home" th:href="@{/admin/login}">
            <img th:src="@{/assets/icones/Icone-Adm.png}" alt="icone admin" width="90" height="90">
            <p>Administrador</p>
        </a>
    </form>
</body>
</html>
