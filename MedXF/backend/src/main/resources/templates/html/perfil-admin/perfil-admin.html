<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/perfil-admin/perfil-admin.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Usuario.png}" type="image/png">
    <title>Editar Perfil - MedXF</title>
</head>
<body>
<header>
    <a th:href="@{/admin/home}" id="botao-mais">
        <img id="img-mais" th:src="@{/assets/icones/Icone-Voltar.png}" alt="icone de voltar" width="20" height="20">
        <span>Menu Principal</span>
    </a>
    <h1 id="nome"></h1>
    <img th:src="@{/assets/icones/Logo2.png}" alt="logo" width="100" height="40">
</header>
<div class="layout">
    <main class="content">
        <div class="page-header">
            <div>
                <h1>Admin</h1>
                <p>Insira os que deseja editar.</p>
            </div>
        </div>
        <div class="patient-grid">
            <div class="patient-card">
                <div class="patient-top">
                    <div class="avatar">MD</div>
                    <div class="patient-info">
                        <h2 th:text="${admin[0]}"></h2>
                        <span>Dados do Admin</span>
                    </div>
                </div>
                <form th:action="@{/admin/perfil}" method="post">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" th:placeholder="${admin[0]}" name="nome">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:placeholder="${admin[1]}" name="email">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" placeholder="Senha" name="senha">
                    </div>
                    <div class="actions">
                        <button type="submit" class="save-btn" style="width: 100%;">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
