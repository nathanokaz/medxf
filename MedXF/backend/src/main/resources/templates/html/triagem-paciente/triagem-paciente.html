<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/triagem-paciente/triagem-paciente.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Usuario.png}" type="image/png">
    <title>Triagem Realizada - MedFX</title>
</head>
<body>

<header>
    <a th:href="@{/paciente/home}" id="botao-mais">
        <img id="img-mais"
             th:src="@{/assets/icones/Icone-Voltar.png}"
             alt="icone de voltar"
             width="20"
             height="20">
        <span>Menu Principal</span>
    </a>
    <img th:src="@{/assets/icones/Logo2.png}"
         alt="logo"
         width="100"
         height="40">
</header>
<div class="layout">
    <main class="content">

        <div class="page-header">
            <div>
                <h1>Triagem Realizada</h1>
                <p>Visualização de todas as respostas registradas.</p>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(respostas)}">
            <div class="patient-card">
                <p>Nenhuma triagem encontrada.</p>
            </div>
        </div>
        <div th:each="triagem : ${respostas}" class="patient-grid">
            <div class="patient-card">
                <div class="patient-top">
                    <div class="patient-info">
                        <h2>
                            Triagem de
                            <span th:text="${pacienteNome}"></span>
                        </h2>
                    </div>
                </div>
                <div class="respostas-container">
                    <div th:each="resp : ${triagem.respostas}"
                         class="resposta-card">
                        <div class="resposta-header">
                            <h3 th:text="${resp.pergunta.descricao}">
                                Pergunta
                            </h3>
                        </div>
                        <div class="resposta-body">
                            <span th:if="${resp.resposta}">
                                SIM
                            </span>
                            <span th:unless="${resp.resposta}">
                                NÃO
                            </span>
                        </div>
                        <div th:if="${resp.observacao != null and !#strings.isEmpty(resp.observacao)}"
                             class="observacao">
                            <strong>Observação:</strong>
                            <p th:text="${resp.observacao}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
