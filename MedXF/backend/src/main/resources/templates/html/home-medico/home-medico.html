<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/home-medico/home-medico.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Casa.png}">
    <title>Início - MedXF</title>
</head>
<body>
    <header>
        <button id="icone-mais">
            <img th:src="@{/assets/icones/Mais-Info.png}" alt="mais" width="20px" height="15px">
        </button>
        <img th:src="@{/assets/icones/Logo2.png}" alt="logo" width="125px" height="50px">
        <div class="usuario">
            <p id="nome-doutor">Nathan Bonitao</p>
            <img id="icone-perfil" th:src="@{/assets/icones/Perfil.png}" alt="perfil" width="40px" height="40px">
        </div>
    </header>
    <div class="container">
        <div class="principal">
            <h1>Bem vindo, Dr. Nathan Bonitão</h1>
            <h2>Menu principal MedXF - Sistema de triagem X frágil</h2>
            <div class="caixas">
                <button class="caixa">
                    <p class="subtitulo">Avaliações Realizadas</p>
                    <p class="numero">12</p>
                </button>
                <button class="caixa">
                    <p class="subtitulo">Pacientes cadastrados</p>
                    <p class="numero">17</p>
                </button>
                <button class="caixa">
                    <p class="subtitulo">Alto Risco</p>
                    <p class="numero">3</p>
                </button>
            </div>
            <div class="lista">
                <h3>Pacientes cadastrados</h3>
                <table>
                    <thead>
                        <tr>
                            <th class="titulo-lista">Paciente</th>
                            <th class="titulo-lista">Idade</th>
                            <th class="titulo-lista">Sintomas</th>
                            <th class="titulo-lista">Risco</th>
                            <th class="titulo-lista">Data</th>
                            <th class="titulo-lista">Status</th>
                            <th class="titulo-lista">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="conteudo-lista">
                                <div class="medico">
                                    <img id="icone-perfil" th:src="@{/assets/icones/Perfil.png}" alt="perfil" width="40px" height="40px">
                                    <div>
                                        <div class="nome">Nathan</div>
                                        <div class="email">nathan@gmail.com</div>
                                    </div>
                                </div>
                            </td>
                            <td class="conteudo-lista">19</td>
                            <td class="conteudo-lista">27</td>
                            <td class="conteudo-lista">
                                <div class="risco">Alto</div>
                            </td>
                            <td class="conteudo-lista">23/05/26</td>
                            <td class="conteudo-lista">
                                <div class="status">Concluído</div>
                            </td>
                            <td class="conteudo-lista">
                                <button id="botao-gerenciar">Gerenciar</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
