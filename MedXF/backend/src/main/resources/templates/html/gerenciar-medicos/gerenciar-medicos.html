<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/gerenciar-medicos/gerenciar-medicos.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Medico.png}" type="image/png">
    <title>Cadastro Médico - MedXF</title>

    <style>
        .btn-gerenciar {
            display: inline-block;
            padding: 8px 16px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-gerenciar:hover {
            opacity: 0.9;
        }

        .acoes {
            text-align: center;
        }
    </style>
</head>
<body>
<header>
    <a th:href="@{/admin/home}" id="botao-mais">
        <img id="img-mais"
             th:src="@{/assets/icones/Icone-Voltar.png}"
             alt="icone de voltar"
             width="20"
             height="20">
        <span>Menu Principal</span>
    </a>

    <img th:src="@{/assets/icones/Logo2.png}"
         alt="logo"
         width="125"
         height="50">

    <div class="usuario">
        <p id="nome">Administrador</p>
        <img
                class="avatar-medico"
                width="40"
                height="40"
                th:if="${foto != null}"
                th:src="@{'/uploads/' + ${foto}}">
        <img
                class="avatar-medico"
                width="40"
                height="40"
                th:unless="${foto != null}"
                th:src="@{/assets/icones/Perfil.png}">
    </div>
</header>

<div class="container">
    <div class="principal">
        <h1>Todos Médicos Cadastrados</h1>

        <div class="lista">
            <div class="lista-header">
                <h3>Médicos Cadastrados</h3>
            </div>

            <table>
                <thead>
                <tr>
                    <th class="titulo-lista">Médico</th>
                    <th class="titulo-lista">CRM</th>
                    <th class="titulo-lista">Especialidade</th>
                    <th class="titulo-lista">Hospital</th>
                    <th class="titulo-lista">Cidade</th>
                    <th class="titulo-lista">Estado</th>
                    <th class="titulo-lista">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="medico : ${medicos}">
                    <td class="conteudo-lista">
                        <div class="medico">
                            <img
                                    class="avatar-medico"
                                    width="40"
                                    height="40"
                                    th:if="${medico.fotoPerfil != null}"
                                    th:src="@{'/uploads/' + ${medico.fotoPerfil}}">
                            <img
                                    class="avatar-medico"
                                    width="40"
                                    height="40"
                                    th:unless="${medico.fotoPerfil != null}"
                                    th:src="@{/assets/icones/Perfil.png}">

                            <div>
                                <div class="nome"
                                     th:text="${medico.nome}">
                                </div>

                                <div class="email"
                                     th:text="${medico.email}">
                                </div>
                            </div>
                        </div>
                    </td>

                    <td class="conteudo-lista"
                        th:text="${medico.crm}">
                    </td>

                    <td class="conteudo-lista"
                        th:text="${medico.especialidade}">
                    </td>

                    <td class="conteudo-lista"
                        th:text="${medico.hospital}">
                    </td>

                    <td class="conteudo-lista"
                        th:text="${medico.cidade}">
                    </td>

                    <td class="conteudo-lista"
                        th:text="${medico.estado}">
                    </td>

                    <td class="conteudo-lista acoes">
                        <a th:href="@{/admin/editar/medico/{id}(id=${medico.id})}"
                           class="btn-gerenciar">
                            Gerenciar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
