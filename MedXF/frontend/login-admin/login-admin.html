<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/MedXF/frontend/global/global.css">
    <link rel="stylesheet" href="/MedXF/frontend/login-admin/login-admin.css">
    <link rel="icon" href="/MedXF/frontend/icones/Icone-Adm.png" type="image/png">
    <title>Login - Admin</title>
</head>
<body>
    <div class="titulo">
        <img src="/MedXF/frontend/icones/Logo.png" alt="logo" width="300" height="100">
        <h1 id="texto-login" >Login - Administrador</h1>
    </div>
    <form class="formulario">
        <div id="div-email">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Digite seu email">
        </div>
        <div class="div-formulario">
            <label for="senha">Senha</label>
            <input id="senha" type="password" placeholder="Digite sua senha">
        </div>
        <button type="submit">Login</button>
    </form>
</body>
</html>
