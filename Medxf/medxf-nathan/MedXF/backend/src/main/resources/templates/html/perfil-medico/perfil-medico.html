<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/global/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/perfil-medico/perfil-medico.css}">
    <link rel="icon" th:href="@{/assets/icones/Icone-Usuario.png}" type="image/png">
    <title>Cadastro Médico - MedXF</title>
</head>
<body>
<header>
    <a th:href="@{/medico/home}" id="botao-mais">
        <img id="img-mais" th:src="@{/assets/icones/Icone-Voltar.png}" alt="icone de voltar" width="20" height="20">
        <span>Menu Principal</span>
    </a>
    <h1 id="nome"></h1>
    <img th:src="@{/assets/icones/Logo2.png}" alt="logo" width="100" height="40">
</header>
<div class="layout">
    <main class="content">
        <div class="page-header">
            <div>
                <h1>Médicos</h1>
                <p>Insira e gerencie os dados para cadastro do médico.</p>
            </div>
        </div>
        <div class="patient-grid">
            <div class="patient-card">
                <div class="patient-top">
                    <div class="avatar">MD</div>
                    <div class="patient-info">
                        <h2>Novo Médico</h2>
                        <span>Dados do Médico</span>
                    </div>
                </div>
                <form th:action="@{/admin/cadastrar/medico}" method="post">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Nome Completo" name="nome">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Email" name="email">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" placeholder="Senha" name="senha">
                    </div>
                    <div class="form-group">
                        <label>CRM</label>
                        <input type="text" placeholder="CRM" name="crm">
                    </div>
                    <div class="form-group">
                        <label>Especialidade</label>
                        <select name="especialidade" id="especialidade-medico">
                            <option value="CARDIOLOGISTA">Cardiologista</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Clínica / Hospital</label>
                        <input type="text" placeholder="Clínica / Hospital" name="hospital">
                    </div>
                    <div class="form-group">
                        <label>Cidade</label>
                        <input type="text" placeholder="Cidade" name="cidade">
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <input type="text" placeholder="Estado" name="estado">
                    </div>
                    <div class="actions">
                        <button type="submit" class="save-btn" style="width: 100%;">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
